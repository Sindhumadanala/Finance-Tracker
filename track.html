<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./track.css">
  </head>
  <body>
    <div class="header">
        <p class="m-0">
            EXPENSE
            <br>TRACKER
            <img src="./icons/purse.png" alt="" width="35px">
        </p>
    </div>

    <div class="enter gap-2">

            <div class="form-floating ">
            <input type="date" class="form-control date-in" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Date <img src="./icons/calendar.png" alt="" width="15px"></label>
            </div>

            <div class="form-floating ">
            <input type="text" class="form-control amount-in" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Amount</label>
            </div>

            <div class="form-floating ">
              <select class="form-select p-2 transc-type-in" id="floatingSelect"  aria-label="Floating label select example">
                <option selected>Transaction Type</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
                
              </select>
              
            </div>

      

            <button class="btn plus" onclick="enterbox()">+</button>
    </div>

    <div class="cards">

          <div class="card">
            <div class="card-body">
            <h5 class="card-title m-0">Total Income <img src="./icons/wallet.png" alt="" width="35px"></h5>
            <h1><img src="./icons/rupee.png" alt="" width="35px">
                    <span id="total-income">0</span>
            </h1>
           
          </div>
          </div>
          <div class="card">
            <div class="card-body">
            <h5 class="card-title m-0">Total Expense<img src="./icons/crypto-wallet.png" alt="" width="35px"></h5>
            <h1><img src="./icons/rupee.png" alt="" width="35px">
                    <span id="total-expense">0</span>
            </h1>
           
          </div>
          </div>

          <div class="card">
            <div class="card-body">
            <h5 class="card-title m-0">Balance <img src="./icons/balance.png" alt="" width="35px"></h5>
            <h1><img src="./icons/rupee.png" alt="" width="35px">
                    <span id="balance">0</span>
            </h1>
           
          </div>
          </div>
    </div>

    <table class="table mt-3" id="trans-table">
        <tr id="head-row">
            <th>Transaction Date</th>
            <th>Transaction Amount</th>
            <th>Transaction Type</th>
            <th>Action</th>
        </tr>
        

    </table>

    <script>
      let tableform=document.getElementById('trans-table')

            function delete_row(row,amount,transactiontype)
            {
              row.remove();

              let totalincome = parseInt(document.getElementById('total-income').innerText);
              let totalexpense = parseInt(document.getElementById('total-expense').innerText);
              let balance = parseInt(document.getElementById('balance').innerText);

              if(transactiontype === 'Income')
                {
                    document.getElementById('total-income').innerText =
                    totalincome - parseInt(amount);

                    document.getElementById('balance').innerText =
                    balance -  parseInt(amount);
                }

                else if(transactiontype === 'Expense')
                {
                    document.getElementById('total-expense').innerText =
                    totalexpense - parseInt(amount);

                    document.getElementById('balance').innerText =
                    balance + parseInt(amount);
                }
            }
      
           function enterbox()
           {
            let date=document.getElementsByClassName('date-in')[0].value
            let amount=document.getElementsByClassName('amount-in')[0].value
            let transactiontype=document.getElementsByClassName('transc-type-in')[0].value

            let row=document.createElement('tr')

            let datecell=document.createElement('td')
            datecell.innerText=date;
            let amountcell=document.createElement('td')
            amountcell.innerText='₹'+amount;
            let transcell=document.createElement('td')
            transcell.innerText=transactiontype;
              
            let bincell=document.createElement('td')
            let deletebutton=document.createElement('button')

            let binimage=document.createElement('img')
            binimage.src='./icons/trash.png'
            binimage.style.width='35px'
            binimage.style.height='35px'

            deletebutton.appendChild(binimage)
            deletebutton.classList.add('btn')
            deletebutton.onclick=()=>delete_row(row,amount,transactiontype)

            bincell.appendChild(deletebutton)

            row.appendChild(datecell)
            row.appendChild(amountcell)
            row.appendChild(transcell)
            row.appendChild(bincell)

            tableform.appendChild(row)

            // cards

            let totalincome=document.getElementById('total-income').innerText
            let totalexpense=document.getElementById('total-expense').innerText
            let balance=document.getElementById('balance').innerText

              if (transactiontype=='Income')
              {
                if (totalincome=='0')
                  {
                    document.getElementById('total-income').innerText=amount
                  }
                else
                  {
                    document.getElementById('total-income').innerText=parseInt(totalincome)+parseInt(amount)
                  }

                if (balance=='0')
                  {
                    document.getElementById('balance').innerText=amount
                  }
                else 
                 {
                    document.getElementById('balance').innerText=parseInt(balance)+parseInt(amount)
                 }
  
              }

              else if (transactiontype=='Expense')
              {
                if (totalexpense=='0')
                  {
                    document.getElementById('total-expense').innerText=amount
                  }
                else
                  {
                    document.getElementById('total-expense').innerText=parseInt(totalexpense)+parseInt(amount)
                  }

                if (balance=='0')
                  {
                    document.getElementById('balance').innerText=-parseInt(amount)
                  }
                else 
                 {
                    document.getElementById('balance').innerText=parseInt(balance)-parseInt(amount)
                 }

  
              }


           }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
